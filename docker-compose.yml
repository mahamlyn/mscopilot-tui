version: '3.9'

services:
  copilot-tui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.10"
    
    container_name: copilot-tui
    
    image: copilot-tui:latest
    
    environment:
      - COPILOT_API_KEY=${COPILOT_API_KEY:-}
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    
    volumes:
      # Mount conversations directory for persistence
      - ./conversations:/app/conversations
      # Optional: Mount dotenv file
      - ./.env:/app/.env:ro
    
    # Interactive terminal for TUI
    stdin_open: true
    tty: true
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Don't automatically restart on failure for interactive app
    restart_policy:
      condition: on-failure
      max_attempts: 0
    
    # Resource limits (optional)
    # mem_limit: 512m
    # cpus: '1.0'

# Named volume for persistent data (optional)
volumes:
  conversations:
    driver: local
